name: Continuous Integration
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - '.vscode-test.mjs'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - '.vscode-test.mjs'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22.x
          cache: 'npm'
      - run: npm ci
      - name: Cache VS Code test binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .vscode-test
          key: vscode-test-${{ runner.os }}-${{ hashFiles('.vscode-test.mjs') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-
      - run: xvfb-run -a npm run test:coverage
        if: runner.os == 'Linux'
      # On non-Linux, compile and run tests directly to skip the redundant lint
      # (lint is OS-agnostic and already runs on Linux via test:coverage)
      - run: npm run compile
        if: runner.os != 'Linux'
      - run: npm run test:vscode
        if: runner.os != 'Linux'
      - name: Upload coverage to Codecov
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        with:
          directory: ./coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
