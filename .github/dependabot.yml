updates:
- commit-message:
    include: scope
    prefix: build
  directory: /
  open-pull-requests-limit: 5
  package-ecosystem: npm
  schedule:
    day: monday
    interval: weekly
    time: "09:00"
    timezone: UTC
- commit-message:
    include: scope
    prefix: ci
  directory: /
  ignore:
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  open-pull-requests-limit: 3
  package-ecosystem: github-actions
  schedule:
    day: monday
    interval: weekly
    time: "09:00"
    timezone: UTC
version: 2
